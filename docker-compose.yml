services:
  mongo:
    image: mongo:7
    platform: linux/arm64        # Apple Silicon native — no emulation warning
    container_name: genlea-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: genlea
    networks:
      - genlea-net

  redis:
    image: redis:7-alpine
    platform: linux/arm64        # Alpine is multi-arch, but pin for consistency
    container_name: genlea-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - genlea-net

  # Optional: Mongo Express UI — http://localhost:8081
  mongo-express:
    image: mongo-express:latest
    platform: linux/arm64
    container_name: genlea-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: genlea_dev
    depends_on:
      - mongo
    networks:
      - genlea-net

  svc-api:
    build:
      context: .
      dockerfile: services/svc-api/Dockerfile
    container_name: genlea-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-4000}:4000"
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017/genlea
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongo
      - redis
    networks:
      - genlea-net

  svc-discovery:
    build:
      context: .
      dockerfile: services/svc-discovery/Dockerfile
    container_name: genlea-discovery
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017/genlea
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongo
      - redis
    networks:
      - genlea-net

  svc-enrichment:
    build:
      context: .
      dockerfile: services/svc-enrichment/Dockerfile
    container_name: genlea-enrichment
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017/genlea
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongo
      - redis
    networks:
      - genlea-net

  svc-scoring:
    build:
      context: .
      dockerfile: services/svc-scoring/Dockerfile
    container_name: genlea-scoring
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017/genlea
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongo
      - redis
    networks:
      - genlea-net


volumes:
  mongo_data:
  redis_data:

networks:
  genlea-net:
    driver: bridge
