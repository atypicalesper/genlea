version: '3.9'

services:
  mongo:
    image: mongo:7
    platform: linux/arm64        # Apple Silicon native — no emulation warning
    container_name: genlea-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: genlea
    networks:
      - genlea-net

  redis:
    image: redis:7-alpine
    platform: linux/arm64        # Alpine is multi-arch, but pin for consistency
    container_name: genlea-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - genlea-net

  # Optional: Mongo Express UI — http://localhost:8081
  mongo-express:
    image: mongo-express:latest
    platform: linux/arm64
    container_name: genlea-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: genlea_dev
    depends_on:
      - mongo
    networks:
      - genlea-net

  # Optional: Bull Board (queue dashboard) — http://localhost:3002
  # Port changed from 3001 → 3002 (3001 commonly used by other dev servers)
  bull-board:
    image: deadly0/bull-board:latest
    platform: linux/amd64        # this image is amd64-only, Docker will emulate on ARM
    container_name: genlea-bullboard
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    networks:
      - genlea-net

volumes:
  mongo_data:
  redis_data:

networks:
  genlea-net:
    driver: bridge
